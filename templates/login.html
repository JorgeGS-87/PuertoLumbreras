<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas GIS — Puerto Lumbreras</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1b2a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,180,216,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,180,216,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        .dot {
            position: fixed;
            border-radius: 50%;
            background: rgba(0,180,216,0.12);
            animation: pulse 3s ease-in-out infinite;
        }
        .dot:nth-child(1) { width:200px; height:200px; top:8%;  left:6%;  animation-delay:0s;   }
        .dot:nth-child(2) { width:130px; height:130px; top:62%; left:78%; animation-delay:1.2s; }
        .dot:nth-child(3) { width: 90px; height: 90px; top:38%; left:91%; animation-delay:2s;   }
        .dot:nth-child(4) { width:110px; height:110px; top:78%; left:14%; animation-delay:0.6s; }
        @keyframes pulse {
            0%,100% { transform:scale(1);    opacity:0.35; }
            50%      { transform:scale(1.15); opacity:0.65; }
        }
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            width: 820px;
            max-width: 95vw;
            min-height: 520px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }
        /* ── Branding lateral ── */
        .branding {
            width: 320px;
            flex-shrink: 0;
            background: linear-gradient(160deg, #1a3a5c 0%, #0d2137 60%, #091929 100%);
            padding: 48px 36px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid rgba(0,180,216,0.12);
        }
        .brand-logo  { font-size: 40px; margin-bottom: 16px; }
        .brand-title { font-size: 21px; font-weight: 700; color: #fff; line-height: 1.35; margin-bottom: 8px; }
        .brand-sub   { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.65; }
        .brand-features { display:flex; flex-direction:column; gap:12px; margin-top:30px; }
        .brand-feature  { display:flex; align-items:center; gap:10px; font-size:12px; color:rgba(255,255,255,0.5); }
        .brand-feature span:first-child { font-size:15px; width:22px; text-align:center; }
        .brand-footer { font-size:10px; color:rgba(255,255,255,0.18); }

        /* ── Panel formulario ── */
        .form-panel {
            flex: 1;
            background: #111d2b;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .form-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .form-sub   { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 28px; }

        /* ── Pestañas login / registro ── */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .tab {
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.35);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .tab.active { color: #00b4d8; border-bottom-color: #00b4d8; }
        .tab:hover:not(.active) { color: rgba(255,255,255,0.6); }

        /* ── Paneles login / registro ── */
        .panel { display: none; }
        .panel.active { display: block; }

        /* ── Campos ── */
        .field { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
        .field label { font-size:11px; font-weight:600; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.5px; }
        .pw-wrap { position: relative; }
        .pw-wrap input { width: 100%; padding-right: 42px; }
        .pw-toggle {
            position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            font-size: 15px; color: rgba(255,255,255,0.3); transition: color 0.15s;
        }
        .pw-toggle:hover { color: rgba(255,255,255,0.65); }
        .field input {
            padding: 11px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            width: 100%;
        }
        .field input:focus { border-color: #00b4d8; background: rgba(0,180,216,0.06); }
        .field input::placeholder { color:rgba(255,255,255,0.18); }

        /* ── Botones ── */
        .btn-primary {
            width: 100%;
            padding: 13px;
            background: #00b4d8;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-bottom: 12px;
        }
        .btn-primary:hover  { background: #0096b5; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary.cargando { background: #007a95; cursor: default; pointer-events: none; }

        .separator {
            display:flex; align-items:center; gap:12px;
            color:rgba(255,255,255,0.18); font-size:11px; margin-bottom: 12px;
        }
        .separator::before, .separator::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.07); }

        .btn-guest {
            width: 100%;
            padding: 11px;
            background: transparent;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-guest:hover { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.65); border-color:rgba(255,255,255,0.22); }

        /* ── Mensajes ── */
        .msg {
            padding: 9px 13px;
            border-radius: 7px;
            font-size: 12px;
            margin-bottom: 14px;
            display: none;
            line-height: 1.5;
        }
        .msg.error   { background:rgba(231,76,60,0.14);  color:#e74c3c; border:1px solid rgba(231,76,60,0.28);  display:block; }
        .msg.success { background:rgba(46,204,113,0.14); color:#2ecc71; border:1px solid rgba(46,204,113,0.28); display:block; }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 13px; height: 13px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 7px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Overlay transición ── */
        #login-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #0d1117;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }
        #login-overlay.activa { opacity: 1; pointer-events: all; }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .container { flex-direction: column; min-height: auto; }
            .branding  { width: 100%; padding: 32px 24px 24px; }
            .brand-features { display: none; }
            .form-panel { padding: 32px 24px; }
        }
    </style>
    <link rel="prefetch" href="/">
</head>
<body>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>

    <div class="container">
        <!-- ── Branding ── -->
        <div class="branding">
            <div>
                <div class="brand-logo">🗺️</div>
                <div class="brand-title">GeoRuta — Puerto Lumbreras</div>
                <div class="brand-sub">Cálculo de rutas óptimas en situaciones de emergencia sísmica.</div>
                <div class="brand-features">
                    <div class="brand-feature"><span>🛣️</span><span>Red de vías OSM</span></div>
                    <div class="brand-feature"><span>📍</span><span>Puntos de interés</span></div>
                    <div class="brand-feature"><span>🎯</span><span>Cálculo de rutas</span></div>
                    <div class="brand-feature"><span>🚧</span><span>Obstáculos sísmicos</span></div>
                </div>
            </div>
            <div><br><img src="/static/img/UPM.png" alt="UPM" style="width:200px;height:auto;"></div>
        </div>

        <!-- ── Formulario ── -->
        <div class="form-panel">
            <div class="form-title">Bienvenido</div>
            <div class="form-sub">Identifícate para acceder al sistema o entra como invitado.</div>

            <!-- Pestañas -->
            <div class="tabs">
                <button class="tab active" onclick="cambiarTab('login')">Iniciar sesión</button>
                <button class="tab"        onclick="cambiarTab('registro')">Registrarse</button>
            </div>

            <!-- ── Panel LOGIN ── -->
            <div class="panel active" id="panel-login">
                <div class="msg" id="msg-login"></div>

                <div class="field">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="tu@email.com"
                        autocomplete="email"
                        onkeydown="if(event.key==='Enter') hacerLogin()">
                </div>
                <div class="field">
                    <label>Contraseña</label>
                    <div class="pw-wrap">
                        <input type="password" id="login-password" placeholder="••••••••"
                            autocomplete="current-password"
                            onkeydown="if(event.key==='Enter') hacerLogin()">
                        <button type="button" class="pw-toggle" onclick="togglePw('login-password',this)">👁️</button>
                    </div>
                </div>

                <button class="btn-primary" id="btn-login" onclick="hacerLogin()">
                    Entrar al mapa
                </button>

                <div class="separator">o continúa sin cuenta</div>
                <button class="btn-guest" onclick="entrarInvitado()">
                    👤 Entrar como invitado
                </button>
            </div>

            <!-- ── Panel REGISTRO ── -->
            <div class="panel" id="panel-registro">
                <div class="msg" id="msg-registro"></div>

                <div class="field">
                    <label>Nombre de usuario</label>
                    <input type="text" id="reg-username" placeholder="ej: maria_lopez"
                        autocomplete="username"
                        onkeydown="if(event.key==='Enter') hacerRegistro()">
                </div>
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="tu@email.com"
                        autocomplete="email"
                        onkeydown="if(event.key==='Enter') hacerRegistro()">
                </div>
                <div class="field">
                    <label>Contraseña <span style="font-weight:400;text-transform:none;font-size:10px;color:rgba(255,255,255,0.25);">(mínimo 6 caracteres)</span></label>
                    <div class="pw-wrap">
                        <input type="password" id="reg-password" placeholder="••••••••"
                            autocomplete="new-password"
                            onkeydown="if(event.key==='Enter') hacerRegistro()">
                        <button type="button" class="pw-toggle" onclick="togglePw('reg-password',this)">👁️</button>
                    </div>
                </div>

                <button class="btn-primary" id="btn-registro" onclick="hacerRegistro()">
                    Crear cuenta
                </button>

                <div class="separator">o continúa sin cuenta</div>
                <button class="btn-guest" onclick="entrarInvitado()">
                    👤 Entrar como invitado
                </button>
            </div>
        </div>
    </div>

    <div id="login-overlay"></div>

    <script>
        // ── Pestañas ──────────────────────────────────────────────────────────
        function cambiarTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'registro'));
            });
            document.getElementById('panel-login').classList.toggle('active',    tab === 'login');
            document.getElementById('panel-registro').classList.toggle('active', tab === 'registro');
            ocultarMsgs();
        }

        function ocultarMsgs() {
            ['msg-login','msg-registro'].forEach(id => {
                const el = document.getElementById(id);
                el.className = 'msg';
                el.textContent = '';
            });
        }

        function mostrarMsg(id, texto, tipo) {
            const el = document.getElementById(id);
            el.textContent = texto;
            el.className   = 'msg ' + tipo;
        }

        // ── Mostrar/ocultar contraseña ────────────────────────────────────────
        function togglePw(inputId, btn) {
            const input   = document.getElementById(inputId);
            const mostrar = input.type === 'password';
            input.type    = mostrar ? 'text' : 'password';
            btn.textContent = mostrar ? '🙈' : '👁️';
        }

        // ── Fade y redirección ────────────────────────────────────────────────
        function irAlMapa() {
            const overlay = document.getElementById('login-overlay');
            overlay.classList.add('activa');
            setTimeout(() => { window.location.href = '/'; }, 340);
        }

        // ── Login ─────────────────────────────────────────────────────────────
        async function hacerLogin() {
            const email    = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            ocultarMsgs();

            if (!email || !password) {
                mostrarMsg('msg-login', 'Introduce tu email y contraseña.', 'error');
                return;
            }

            const btn = document.getElementById('btn-login');
            btn.classList.add('cargando');
            btn.innerHTML = '<span class="spinner"></span>Verificando…';

            try {
                const r    = await fetch('/api/auth/entrar', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ email, password }),
                });
                const data = await r.json();

                if (!r.ok || !data.ok) {
                    mostrarMsg('msg-login', data.error || 'Error al iniciar sesión.', 'error');
                    return;
                }
                irAlMapa();
            } catch (e) {
                mostrarMsg('msg-login', 'Error de conexión con el servidor.', 'error');
            } finally {
                btn.classList.remove('cargando');
                btn.innerHTML = 'Entrar al mapa';
            }
        }

        // ── Registro ──────────────────────────────────────────────────────────
        async function hacerRegistro() {
            const username = document.getElementById('reg-username').value.trim();
            const email    = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            ocultarMsgs();

            if (!username || !email || !password) {
                mostrarMsg('msg-registro', 'Todos los campos son obligatorios.', 'error');
                return;
            }
            if (password.length < 6) {
                mostrarMsg('msg-registro', 'La contraseña debe tener al menos 6 caracteres.', 'error');
                return;
            }

            const btn = document.getElementById('btn-registro');
            btn.classList.add('cargando');
            btn.innerHTML = '<span class="spinner"></span>Creando cuenta…';

            try {
                const r    = await fetch('/api/auth/registrar', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ username, email, password }),
                });
                const data = await r.json();

                if (!r.ok || !data.ok) {
                    mostrarMsg('msg-registro', data.error || 'Error al registrar.', 'error');
                    return;
                }

                // Registro OK → mostrar éxito y cambiar a pestaña de login
                mostrarMsg('msg-registro', '✅ Cuenta creada. Ahora inicia sesión.', 'success');
                setTimeout(() => {
                    cambiarTab('login');
                    document.getElementById('login-email').value = email;
                    document.getElementById('login-password').focus();
                }, 1400);
            } catch (e) {
                mostrarMsg('msg-registro', 'Error de conexión con el servidor.', 'error');
            } finally {
                btn.classList.remove('cargando');
                btn.innerHTML = 'Crear cuenta';
            }
        }

        // ── Invitado ──────────────────────────────────────────────────────────
        async function entrarInvitado() {
            await fetch('/api/auth/entrar', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ invitado: true }),
            });
            irAlMapa();
        }

        // Foco automático al cargar
        window.addEventListener('load', () => {
            document.getElementById('login-email').focus();
        });
    </script>
</body>
</html>
